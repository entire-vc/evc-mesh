version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
    - gocritic
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
      disabled-checks:
        - exitAfterDefer

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes: github.com/entire-vc/evc-mesh

exclusions:
  rules:
    - path: _test\.go
      linters:
        - errcheck
        - unparam
        - unused
    - path: mock_
      linters:
        - unused
        - unparam
