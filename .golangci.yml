version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
    - gocritic
  settings:
    govet:
      shadow:
        enable: true
    goimports:
      local-prefixes:
        - github.com/entire-vc/evc-mesh
    gocritic:
      enabled-tags:
        - diagnostic
        - style

exclusions:
  rules:
    - path: _test\.go
      linters:
        - errcheck
        - unparam
    - path: mock_
      linters:
        - unused
        - unparam
