services:
  # PostgreSQL 16
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mesh
      POSTGRES_USER: mesh
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mesh"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 7
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NATS with JetStream
  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: ["--jetstream", "--store_dir", "/data", "--http_port", "8222"]
    volumes:
      - natsdata:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # MinIO (S3-compatible object storage)
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Mesh API Server (Go binary + runs DB migrations on startup)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
      minio:
        condition: service_started
    ports:
      - "${API_PORT:-8005}:8005"
    environment:
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8005"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: mesh
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: mesh
      DB_SSL_MODE: disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NATS_URL: nats://nats:4222
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY}
      S3_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY}
      S3_BUCKET: mesh-artifacts
      S3_REGION: us-east-1
      S3_USE_SSL: "false"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      MESH_CORS_ORIGINS: ${CORS_ORIGINS:-*}
      MESH_RATE_LIMIT_ENABLED: "true"
      MESH_RATE_LIMIT_AUTH_RPM: "20"
      MESH_RATE_LIMIT_API_RPM: "600"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8005/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Nginx: serves React SPA + proxies /api and /ws to the API
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"

  # Mesh MCP Server (SSE mode for remote agents)
  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["mesh-mcp", "--transport", "sse"]
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${MCP_PORT:-8081}:8081"
    environment:
      MESH_API_URL: http://api:8005
      MESH_MCP_TRANSPORT: sse
      MESH_MCP_HOST: "0.0.0.0"
      MESH_MCP_PORT: "8081"

  # Prometheus — scrapes /metrics from the API server
  prometheus:
    image: prom/prometheus:v2.50.0
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - api

  # Grafana — dashboards for API metrics
  grafana:
    image: grafana/grafana:10.3.1
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
  redisdata:
  natsdata:
  miniodata:
  promdata:
  grafanadata:
