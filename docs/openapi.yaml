        content:
          application/json:
            schema:
              type: object
              required: [rule_type, name, enforcement]
              properties:
                rule_type:
                  type: string
                name:
                  type: string
                description:
                  type: string
                config:
                  type: object
                applies_to_actor_types:
                  type: array
                  items:
                    type: string
                applies_to_roles:
                  type: array
                  items:
                    type: string
                enforcement:
                  type: string
                  enum: [advisory, block]
                priority:
                  type: integer
                  default: 0
      responses:
        "201":
          description: Rule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rule"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      tags: [GovernanceRules]
      summary: List governance rules for a project
      operationId: listProjectRules
      parameters:
        - name: include_disabled
          in: query
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Rules list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Rule"
                  total_count:
                    type: integer

  /api/v1/projects/{proj_id}/rules/effective:
    parameters:
      - name: proj_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [GovernanceRules]
      summary: Get effective governance rules for the current actor in a project
      operationId: getProjectEffectiveRules
      responses:
        "200":
          description: Effective rules (workspace + project merged)
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Rule"
                  total_count:
                    type: integer

  /api/v1/rules/{rule_id}:
    parameters:
      - name: rule_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [GovernanceRules]
      summary: Get a governance rule by ID
      operationId: getRule
      responses:
        "200":
          description: Rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rule"
        "404":
          description: Rule not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      tags: [GovernanceRules]
      summary: Update a governance rule
      operationId: updateRule
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                config:
                  type: object
                applies_to_actor_types:
                  type: array
                  items:
                    type: string
                applies_to_roles:
                  type: array
                  items:
                    type: string
                enforcement:
                  type: string
                  enum: [advisory, block]
                priority:
                  type: integer
                is_enabled:
                  type: boolean
      responses:
        "200":
          description: Updated rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rule"
        "404":
          description: Rule not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [GovernanceRules]
      summary: Delete a governance rule
      operationId: deleteRule
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Rule deleted
        "404":
          description: Rule not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/rules/evaluate:
    post:
      tags: [GovernanceRules]
      summary: Dry-run evaluate rules for a proposed action
      operationId: evaluateRules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, workspace_id]
              properties:
                action:
                  type: string
                  description: Action to evaluate (e.g. move_task, create_task)
                workspace_id:
                  type: string
                  format: uuid
                project_id:
                  type: string
                  format: uuid
                  nullable: true
                task_id:
                  type: string
                  format: uuid
                  nullable: true
                target_status_id:
                  type: string
                  format: uuid
                  nullable: true
      responses:
        "200":
          description: Evaluation result with any violations
          content:
            application/json:
              schema:
                type: object
                properties:
                  violations:
                    type: array
                    items:
                      $ref: "#/components/schemas/RuleViolation"
                  blocked:
                    type: boolean

  # ------------------------------------------------------------------
  # Violations Log
  # ------------------------------------------------------------------
  /api/v1/workspaces/{ws_id}/violations:
    parameters:
      - name: ws_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [GovernanceRules]
      summary: List rule violation log for a workspace
      operationId: listViolations
      parameters:
        - name: limit
          in: query
          description: Maximum number of violations (default 100)
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: Violations log
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                  total_count:
                    type: integer
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ------------------------------------------------------------------
  # Config Import/Export
  # ------------------------------------------------------------------
  /api/v1/workspaces/{ws_id}/config/export:
    parameters:
      - name: ws_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Config]
      summary: Export workspace config as YAML (mesh-config.yaml format)
      operationId: exportConfig
      responses:
        "200":
          description: YAML workspace config
          content:
            application/yaml:
              schema:
                type: string
                format: binary
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/workspaces/{ws_id}/config/import:
    parameters:
      - name: ws_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [Config]
      summary: Import workspace config from YAML
      operationId: importConfig
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/yaml:
            schema:
              type: string
              format: binary
              description: YAML in mesh-config.yaml format
      responses:
        "200":
          description: Import result summary
          content:
            application/json:
              schema:
                type: object
                description: Import result with counts of created/updated/skipped entities
        "400":
          description: Invalid YAML or config schema error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/workspaces/{ws_id}/team/import:
    parameters:
      - name: ws_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [Config]
      summary: Bulk-import agent/human team profiles from YAML
      operationId: importTeam
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/yaml:
            schema:
              type: string
              format: binary
              description: YAML TeamConfig with agent and human profile entries
      responses:
        "200":
          description: Import result summary
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Invalid YAML
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ------------------------------------------------------------------
  # Spark Agent Catalog (optional — enabled via MESH_SPARK_ENABLED=true)
  # ------------------------------------------------------------------
  /api/v1/spark/agents:
    get:
      tags: [Spark]
      summary: Search the Spark agent catalog
      operationId: sparkSearchAgents
      parameters:
        - name: q
          in: query
          description: Free-text search query
          schema:
            type: string
        - name: tags
          in: query
          description: Comma-separated list of tags to filter by
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Matching agents from Spark catalog
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/SparkAgentManifest"
                  count:
                    type: integer
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/spark/agents/popular:
    get:
      tags: [Spark]
      summary: Get popular agents from the Spark catalog
      operationId: sparkPopularAgents
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Popular agents
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/SparkAgentManifest"
                  count:
                    type: integer
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/spark/agents/{agent_id}:
    parameters:
      - name: agent_id
        in: path
        required: true
        schema:
          type: string
          description: Spark catalog agent ID (not a UUID — Spark-assigned string)
    get:
      tags: [Spark]
      summary: Get a Spark agent manifest by ID
      operationId: sparkGetAgent
      responses:
        "200":
          description: Spark agent manifest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SparkAgentManifest"
        "404":
          description: Agent not found in catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Spark catalog unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/spark/agents/{agent_id}/install:
    parameters:
      - name: agent_id
        in: path
        required: true
        schema:
          type: string
          description: Spark catalog agent ID
    post:
      tags: [Spark]
      summary: Install a Spark catalog agent into a workspace
      operationId: sparkInstallAgent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workspace_id]
              properties:
                workspace_id:
                  type: string
                  format: uuid
      responses:
        "201":
          description: Agent installed and registered locally
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent:
                    $ref: "#/components/schemas/Agent"
                  api_key:
                    type: string
                    description: Plaintext API key — only returned once
                  spark:
                    type: object
                    properties:
                      id:
                        type: string
                      version:
                        type: string
                      author:
                        type: string
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Agent not found in catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Spark catalog unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
