                  $ref: "#/components/schemas/ActivityLogEntry"

  /api/v1/tasks/{task_id}/activity:
    parameters:
      - name: task_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Activity]
      summary: List activity log for a task
      responses:
        "200":
          description: Activity log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityLogEntry"
