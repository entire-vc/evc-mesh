      summary: List subtasks of a task
      responses:
        "200":
          description: List of subtasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"

  # ------------------------------------------------------------------
  # Dependencies
  # ------------------------------------------------------------------
  /api/v1/tasks/{task_id}/dependencies:
    parameters:
      - name: task_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Dependencies]
      summary: List dependencies for a task
      responses:
        "200":
          description: List of dependencies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskDependency"
    post:
      tags: [Dependencies]
      summary: Add a dependency between tasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [depends_on_task_id]
              properties:
                depends_on_task_id:
                  type: string
                  format: uuid
                dependency_type:
                  type: string
                  enum: [blocks, relates_to, is_child_of]
                  default: blocks
      responses:
        "201":
          description: Dependency created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskDependency"

  /api/v1/tasks/{task_id}/dependencies/{dep_id}:
    parameters:
      - name: task_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: dep_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      tags: [Dependencies]
      summary: Remove a dependency
      responses:
        "204":
          description: Deleted

  /api/v1/projects/{proj_id}/dependency-graph:
    parameters:
      - name: proj_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Dependencies]
      summary: Get the full dependency graph for a project
      description: |
        Returns all tasks in the project together with all their inter-task
        dependencies in a single response, avoiding N+1 client-side fetches.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Dependency graph
          content:
            application/json:
              schema:
                type: object
                properties:
                  tasks:
                    type: array
                    items:
                      $ref: "#/components/schemas/Task"
                  dependencies:
                    type: array
                    items:
                      $ref: "#/components/schemas/TaskDependency"

