  # ------------------------------------------------------------------
  # GitHub Webhook Receiver (public — no auth)
  # ------------------------------------------------------------------
  /webhooks/github:
    post:
      tags: [VCSLinks]
      summary: Receive GitHub webhook events (push, pull_request)
      operationId: githubWebhook
      security: []
      parameters:
        - name: X-GitHub-Event
          in: header
          required: true
          schema:
            type: string
            example: pull_request
        - name: X-Hub-Signature-256
          in: header
          description: HMAC-SHA256 signature (optional, required when MESH_GITHUB_WEBHOOK_SECRET is set)
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: GitHub webhook payload
      responses:
        "200":
          description: Event processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
        "400":
          description: Bad request (missing event header or invalid payload)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid HMAC signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

