    parameters:
      - name: ws_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Activity]
      summary: Export workspace audit log as CSV or JSON
      operationId: exportActivity
      security:
        - BearerAuth: []
      parameters:
        - name: format
          in: query
          description: "Output format: json (default) or csv"
          schema:
            type: string
            enum: [json, csv]
        - name: from
          in: query
          description: Start of time range (ISO 8601, e.g. 2024-01-01T00:00:00Z)
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: End of time range (ISO 8601)
          schema:
            type: string
            format: date-time
        - name: entity_type
          in: query
          schema:
            type: string
        - name: action
          in: query
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum number of entries (max 10000, default 1000)
          schema:
            type: integer
            maximum: 10000
