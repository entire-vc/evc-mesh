        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Artifacts]
      summary: Get presigned download URL (redirects to the file)
      responses:
        "307":
          description: Redirect to presigned URL
          headers:
            Location:
              schema:
                type: string
                format: uri

  # ------------------------------------------------------------------
  # Agents
  # ------------------------------------------------------------------
  /api/v1/workspaces/{ws_id}/agents:
    parameters:
      - name: ws_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Agents]
      summary: List agents in a workspace
      responses:
        "200":
          description: List of agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"
    post:
      tags: [Agents]
      summary: Register a new agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, agent_type]
              properties:
                name:
                  type: string
                agent_type:
                  type: string
                  enum: [claude_code, openclaw, cline, aider, custom]
                capabilities:
                  type: object
      responses:
        "201":
          description: Agent registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent:
                    $ref: "#/components/schemas/Agent"
                  api_key:
                    type: string
                    description: Raw API key (only returned once at registration)

  /api/v1/agents/{agent_id}:
    parameters:
      - name: agent_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Agents]
      summary: Get agent by ID
      operationId: getAgentByID
      responses:
        "200":
          description: Agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      tags: [Agents]
      summary: Update an agent (admin)
      operationId: updateAgent
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                agent_type:
                  type: string
                  enum: [claude_code, openclaw, cline, aider, custom]
                capabilities:
                  type: object
                profile_description:
                  type: string
                callback_url:
                  type: string
                  format: uri
                current_task_id:
                  type: string
                  format: uuid
                  nullable: true
      responses:
        "200":
          description: Updated agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [Agents]
      summary: Delete an agent
      operationId: deleteAgent
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Agent deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/agents/{agent_id}/regenerate-key:
    parameters:
      - name: agent_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [Agents]
      summary: Regenerate an agent's API key
      operationId: regenerateAgentKey
      security:
        - BearerAuth: []
      responses:
        "200":
          description: New API key and updated agent
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent:
                    $ref: "#/components/schemas/Agent"
                  api_key:
                    type: string
                    description: Plaintext API key — only returned once
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/agents/heartbeat:
    post:
      tags: [Agents]
      summary: Send agent heartbeat
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [online, busy, error]
                current_task_id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Heartbeat accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"

  # ------------------------------------------------------------------
  # Events
  # ------------------------------------------------------------------
  /api/v1/projects/{proj_id}/events:
    parameters:
      - name: proj_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Events]
      summary: List events in a project
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
      responses:
        "200":
          description: Paginated list of events
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/EventBusMessage"
    post:
      tags: [Events]
      summary: Publish an event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event_type, subject, payload]
              properties:
                event_type:
                  type: string
                  enum: [summary, status_change, context_update, error, dependency_resolved, custom]
                subject:
                  type: string
                payload:
                  type: object
                task_id:
                  type: string
                  format: uuid
                tags:
                  type: array
                  items:
                    type: string
                ttl_hours:
                  type: integer
