  # ------------------------------------------------------------------
  # Artifacts
  # ------------------------------------------------------------------
  /api/v1/tasks/{task_id}/artifacts:
    parameters:
      - name: task_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Artifacts]
      summary: List artifacts for a task
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
      responses:
        "200":
          description: Paginated list of artifacts
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/Artifact"
    post:
      tags: [Artifacts]
      summary: Upload an artifact
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [name, file]
              properties:
                name:
                  type: string
                file:
                  type: string
                  format: binary
                artifact_type:
                  type: string
                  enum: [file, code, log, report, link, image, data]
                metadata:
                  type: string
                  description: JSON-encoded metadata
      responses:
        "201":
          description: Artifact uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Artifact"

  /api/v1/artifacts/{artifact_id}:
    parameters:
      - name: artifact_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Artifacts]
      summary: Get artifact metadata
      responses:
        "200":
          description: Artifact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Artifact"
    delete:
      tags: [Artifacts]
      summary: Delete an artifact
      responses:
        "204":
          description: Deleted

  /api/v1/artifacts/{artifact_id}/download:
    parameters:
