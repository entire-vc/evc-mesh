openapi: "3.0.3"

info:
  title: EVC Mesh API
  description: |
    REST API for EVC Mesh -- a multi-agent task management platform.
    Provides workspace, project, task, comment, artifact, agent, and event-bus
    endpoints for both human users (JWT) and AI agents (API key).
  version: "0.1.0"
  contact:
    name: EVC Mesh Team

servers:
  - url: http://localhost:8005
    description: Local development

security:
  - BearerAuth: []
  - AgentKeyAuth: []

components:
  # ------------------------------------------------------------------
  # Security schemes
  # ------------------------------------------------------------------
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained via /auth/login or /auth/refresh.
    AgentKeyAuth:
      type: apiKey
      in: header
      name: X-Agent-Key
      description: Agent API key in the format agk_{workspace_slug}_{random}.

  # ------------------------------------------------------------------
  # Reusable schemas
  # ------------------------------------------------------------------
  schemas:
    # ---------- Error ----------
    Error:
      type: object
      required: [error, code]
      properties:
        error:
          type: string
        code:
          type: string
        details:
          type: object
          additionalProperties:
            type: string

    # ---------- Pagination wrapper ----------
    PaginatedResponse:
      type: object
      properties:
        items:
          type: array
          items: {}
        total:
          type: integer
        page:
          type: integer
        per_page:
          type: integer
        has_more:
          type: boolean

    # ---------- Auth ----------
    TokenPair:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        tokens:
          $ref: "#/components/schemas/TokenPair"

    # ---------- Core domain ----------
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        name:
          type: string
        avatar_url:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Workspace:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        owner_id:
          type: string
          format: uuid
        settings:
          type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        slug:
          type: string
        icon:
          type: string
        settings:
          type: object
        default_assignee_type:
          type: string
          enum: [user, agent, none]
        is_archived:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TaskStatus:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        color:
          type: string
        position:
          type: integer
        category:
          type: string
          enum: [backlog, todo, in_progress, review, done, cancelled]
        is_default:
          type: boolean

    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        status_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        assignee_id:
          type: string
          format: uuid
          nullable: true
        assignee_type:
          type: string
          enum: [user, agent, unassigned]
        priority:
          type: string
          enum: [urgent, high, medium, low, none]
        parent_task_id:
          type: string
          format: uuid
          nullable: true
        position:
          type: integer
        due_date:
          type: string
          format: date-time
          nullable: true
        estimated_hours:
          type: number
          nullable: true
        custom_fields:
          type: object
        labels:
          type: array
          items:
            type: string
        created_by:
          type: string
          format: uuid
        created_by_type:
          type: string
          enum: [user, agent, system]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true

    Comment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        task_id:
          type: string
          format: uuid
        parent_comment_id:
          type: string
          format: uuid
          nullable: true
        author_id:
          type: string
          format: uuid
        author_type:
          type: string
          enum: [user, agent, system]
        body:
          type: string
        metadata:
          type: object
        is_internal:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Artifact:
      type: object
      properties:
        id:
          type: string
          format: uuid
        task_id:
          type: string
          format: uuid
        name:
          type: string
        artifact_type:
          type: string
          enum: [file, code, log, report, link, image, data]
        mime_type:
          type: string
        storage_key:
          type: string
        storage_url:
          type: string
        size_bytes:
          type: integer
          format: int64
        checksum_sha256:
          type: string
        metadata:
          type: object
        uploaded_by:
          type: string
          format: uuid
        uploaded_by_type:
          type: string
          enum: [user, agent]
        created_at:
          type: string
          format: date-time

    Agent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        agent_type:
          type: string
          enum: [claude_code, openclaw, cline, aider, custom]
        api_key_prefix:
          type: string
        capabilities:
          type: object
        status:
          type: string
          enum: [online, offline, busy, error]
        last_heartbeat:
          type: string
          format: date-time
          nullable: true
        current_task_id:
          type: string
          format: uuid
          nullable: true
        total_tasks_completed:
          type: integer
        total_errors:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    EventBusMessage:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid
        event_type:
          type: string
          enum: [summary, status_change, context_update, error, dependency_resolved, custom]
        subject:
          type: string
        payload:
          type: object
        task_id:
          type: string
          format: uuid
          nullable: true
        tags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
          nullable: true

    ActivityLogEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        entity_type:
          type: string
        entity_id:
          type: string
          format: uuid
        action:
          type: string
        actor_id:
          type: string
          format: uuid
        actor_type:
          type: string
          enum: [user, agent, system]
        changes:
          type: object
        created_at:
          type: string
          format: date-time

    # ---------- Task Dependency ----------
    TaskDependency:
      type: object
      properties:
        id:
          type: string
          format: uuid
        task_id:
          type: string
          format: uuid
        depends_on_task_id:
          type: string
          format: uuid
        dependency_type:
          type: string
          enum: [blocks, relates_to, is_child_of]
        created_at:
          type: string
          format: date-time

    # ---------- Custom Field Definition ----------
    CustomFieldDefinition:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        field_type:
          type: string
          enum: [text, number, date, datetime, select, multiselect, url, email, checkbox, user_ref, agent_ref, json]
        description:
          type: string
        options:
          type: object
          description: Configuration for select/multiselect fields (e.g. allowed values)
        default_value:
          description: Default value for the field (type depends on field_type)
        is_required:
          type: boolean
        is_visible_to_agents:
          type: boolean
        position:
          type: integer
        created_at:
          type: string
          format: date-time

    # ---------- Workspace Member ----------
    WorkspaceMember:
      type: object
      properties:
        workspace_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [owner, admin, member, viewer]
        invited_by:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
        user:
          $ref: "#/components/schemas/User"

    # ---------- Project Member ----------
    ProjectMember:
      type: object
      properties:
        project_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [admin, member, viewer]
        created_at:
          type: string
          format: date-time
        user:
          $ref: "#/components/schemas/User"

    # ---------- Webhook ----------
    WebhookConfig:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        name:
          type: string
        url:
          type: string
        events:
          type: array
          items:
            type: string
        is_active:
          type: boolean
        failure_count:
          type: integer
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WebhookDelivery:
      type: object
      properties:
        id:
          type: string
          format: uuid
        webhook_id:
          type: string
          format: uuid
        event_type:
          type: string
        payload:
          type: object
        response_status:
          type: integer
          nullable: true
        response_body:
          type: string
          nullable: true
        error:
          type: string
          nullable: true
        delivered_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    # ---------- Saved View ----------
    SavedView:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        name:
          type: string
        view_type:
          type: string
          enum: [board, list, timeline]
        filters:
          type: object
        sort_by:
          type: string
          nullable: true
        sort_order:
          type: string
          enum: [asc, desc]
          nullable: true
        columns:
          type: array
          items:
            type: string
        is_shared:
          type: boolean
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ---------- VCS Link ----------
    VCSLink:
      type: object
      properties:
        id:
          type: string
          format: uuid
        task_id:
          type: string
          format: uuid
        provider:
          type: string
          enum: [github, gitlab]
        link_type:
          type: string
          enum: [pr, commit, branch]
        external_id:
          type: string
        url:
          type: string
        title:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time

    # ---------- Integration ----------
    IntegrationConfig:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        provider:
          type: string
          enum: [slack, github, spark, mcp]
        config:
          type: object
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ---------- Project Update ----------
    ProjectUpdate:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        title:
          type: string
        status:
          type: string
          enum: [on_track, at_risk, off_track, completed]
        summary:
          type: string
        highlights:
          type: array
          items:
            type: object
            properties:
              text:
                type: string
        blockers:
          type: array
          items:
            type: object
            properties:
              text:
                type: string
        next_steps:
          type: array
          items:
            type: object
            properties:
              text:
                type: string
        metrics:
          type: object
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    # ---------- Initiative ----------
    Initiative:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [planning, active, completed, cancelled]
        target_date:
          type: string
          format: date
          nullable: true
        projects:
          type: array
          items:
            $ref: "#/components/schemas/Project"
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ---------- Governance Rule ----------
    Rule:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
          nullable: true
        scope:
          type: string
          enum: [workspace, project]
        rule_type:
          type: string
        name:
          type: string
        description:
          type: string
        config:
          type: object
        applies_to_actor_types:
          type: array
          items:
            type: string
        applies_to_roles:
          type: array
          items:
            type: string
        enforcement:
          type: string
          enum: [advisory, block]
        priority:
          type: integer
        is_enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    RuleViolation:
      type: object
      properties:
        rule_id:
          type: string
          format: uuid
        rule_name:
          type: string
        enforcement:
          type: string
          enum: [advisory, block]
        message:
          type: string

    # ---------- Analytics ----------
    AnalyticsMetrics:
      type: object
      properties:
        workspace_id:
          type: string
          format: uuid
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        tasks_created:
          type: integer
        tasks_completed:
          type: integer
        tasks_in_progress:
          type: integer
        average_cycle_time_hours:
          type: number
          nullable: true
        top_assignees:
          type: array
          items:
            type: object
        by_project:
          type: array
          items:
            type: object
        by_status_category:
          type: object

    # ---------- Team Directory ----------
    TeamDirectoryEntry:
      type: object
      properties:
        agent_id:
          type: string
          format: uuid
        name:
          type: string
        role:
          type: string
        capabilities:
          type: array
          items:
            type: string
        zone:
          type: string
        max_tasks:
          type: integer
        working_hours:
          type: string
        accepts_from:
          type: array
          items:
            type: string
        escalation_agent_id:
          type: string
          format: uuid
          nullable: true
        current_task_id:
          type: string
          format: uuid
          nullable: true
        status:
          type: string
          enum: [online, offline, busy, error]

    # ---------- Assignment Rules Config ----------
    AssignmentRulesConfig:
      type: object
      properties:
        strategy:
          type: string
          enum: [manual, round_robin, least_loaded, capability_match]
        capability_requirements:
          type: array
          items:
            type: string
        fallback_assignee_id:
          type: string
          format: uuid
          nullable: true
        max_tasks_per_agent:
          type: integer

    # ---------- Workflow Rules Config ----------
    WorkflowRulesConfig:
      type: object
      properties:
        allowed_transitions:
          type: array
          items:
            type: object
            properties:
              from:
                type: string
              to:
                type: string
              requires_role:
                type: string
        required_fields_by_status:
          type: object
        auto_assign_on_status:
          type: object

    # ---------- Spark Catalog ----------
    SparkAgentManifest:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        version:
          type: string
        author:
          type: string
        agent_type:
          type: string
        capabilities:
          type: object
        config:
          type: object
        tags:
          type: array
          items:
            type: string

  # ------------------------------------------------------------------
  # Reusable parameters
  # ------------------------------------------------------------------
  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
    PageSizeParam:
      name: page_size
      in: query
      schema:
        type: integer
        default: 50

# ====================================================================
# Paths
# ====================================================================
paths:
  # ------------------------------------------------------------------
  # Health
  # ------------------------------------------------------------------
  /health:
    get:
      tags: [Health]
      summary: Health check
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  service:
                    type: string

  # ------------------------------------------------------------------
  # Auth
  # ------------------------------------------------------------------
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email:
                  type: string
                password:
                  type: string
                name:
                  type: string
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Log in with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh an access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: New token pair
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens:
                    $ref: "#/components/schemas/TokenPair"
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout (revoke all refresh tokens for the current user)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Successfully logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  # ------------------------------------------------------------------
  # Workspaces
  # ------------------------------------------------------------------
  /api/v1/workspaces:
    get:
      tags: [Workspaces]
      summary: List workspaces for the current user
      responses:
        "200":
          description: List of workspaces
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Workspace"
    post:
      tags: [Workspaces]
      summary: Create a workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, slug]
              properties:
                name:
                  type: string
                slug:
                  type: string
                settings:
                  type: object
      responses:
        "201":
          description: Workspace created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"

  /api/v1/workspaces/{ws_id}:
    parameters:
      - name: ws_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Workspaces]
      summary: Get workspace by ID
      responses:
        "200":
          description: Workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      tags: [Workspaces]
      summary: Update workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                settings:
                  type: object
      responses:
        "200":
          description: Updated workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
    delete:
      tags: [Workspaces]
      summary: Delete workspace
      responses:
        "204":
          description: Deleted

  # ------------------------------------------------------------------
  # Projects
  # ------------------------------------------------------------------
  /api/v1/workspaces/{ws_id}/projects:
    parameters:
      - name: ws_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Projects]
      summary: List projects in a workspace
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      tags: [Projects]
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
