  # ------------------------------------------------------------------
  # Tasks
  # ------------------------------------------------------------------
  /api/v1/projects/{proj_id}/tasks:
    parameters:
      - name: proj_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Tasks]
      summary: List tasks in a project
      description: |
        Supports filtering by status, assignee_type, priority, labels, and search.
        Custom field filters use the `custom.` prefix:
        - `custom.{slug}=value` -- exact match
        - `custom.{slug}_gte=N` -- numeric greater-than-or-equal
        - `custom.{slug}_lte=N` -- numeric less-than-or-equal
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - name: status
          in: query
          description: Filter by status UUID
          schema:
            type: string
            format: uuid
        - name: assignee_type
          in: query
          description: "Filter by assignee type: user, agent, unassigned"
          schema:
            type: string
            enum: [user, agent, unassigned]
        - name: priority
          in: query
          description: "Filter by priority: urgent, high, medium, low, none"
          schema:
            type: string
            enum: [urgent, high, medium, low, none]
        - name: labels
          in: query
          description: Filter by label
          schema:
            type: string
        - name: search
          in: query
          description: Search in title and description
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of tasks
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/Task"
    post:
      tags: [Tasks]
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                description:
                  type: string
                priority:
                  type: string
                  enum: [urgent, high, medium, low, none]
                assignee_id:
                  type: string
                  format: uuid
                assignee_type:
                  type: string
                  enum: [user, agent, unassigned]
                status_id:
                  type: string
                  format: uuid
                parent_task_id:
                  type: string
                  format: uuid
                due_date:
                  type: string
                  format: date-time
                estimated_hours:
                  type: number
                labels:
                  type: array
                  items:
                    type: string
                custom_fields:
                  type: object
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /api/v1/tasks/{task_id}:
    parameters:
      - name: task_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Tasks]
      summary: Get task by ID
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    patch:
      tags: [Tasks]
      summary: Update a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                priority:
                  type: string
                assignee_id:
                  type: string
                  format: uuid
                  nullable: true
                assignee_type:
                  type: string
                labels:
                  type: array
                  items:
                    type: string
                status_id:
                  type: string
                  format: uuid
                due_date:
                  type: string
                  format: date-time
                  nullable: true
                estimated_hours:
                  type: number
                  nullable: true
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      tags: [Tasks]
      summary: Delete a task
      responses:
        "204":
          description: Deleted

  /api/v1/tasks/{task_id}/move:
    parameters:
      - name: task_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [Tasks]
      summary: Move a task to a different status or position
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status_id:
                  type: string
                  format: uuid
                position:
                  type: integer
      responses:
        "200":
          description: Moved task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /api/v1/tasks/{task_id}/subtasks:
    parameters:
      - name: task_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
